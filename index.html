<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizScore AI | Prediction</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>QuizScore AI</h1>
        <p class="subtitle">Predict your performance using advanced AI models</p>
        
        <form id="predictionForm">
            <div class="input-group">
                <label for="studyHours">Study Hours (0 - 20)</label>
                <input type="number" id="studyHours" placeholder="e.g. 12" min="0" max="20" step="0.5" required>
            </div>
            
            <div class="input-group">
                <label for="prevScores">Previous Quiz Scores (0 - 100)</label>
                <input type="number" id="prevScores" placeholder="e.g. 85" min="0" max="100" required>
            </div>
            
            <div class="input-group">
                <label for="difficulty">Quiz Difficulty</label>
                <select id="difficulty" required>
                    <option value="1">Easy</option>
                    <option value="2" selected>Medium</option>
                    <option value="3">Hard</option>
                </select>
            </div>
            
            <div class="input-group">
                <label for="timeSpent">Time Plan to Spend (minutes)</label>
                <input type="number" id="timeSpent" placeholder="e.g. 45" min="10" max="60" required>
            </div>
            
            <button type="submit" id="predictBtn">Analyze Performance</button>
        </form>

        <div id="resultCard" class="result-card">
            <div class="result-label">Predicted Score</div>
            <div id="predictionValue" class="result-value">85.4</div>
            <div class="result-label" id="confidenceText">Confidence: High</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
